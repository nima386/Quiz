<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<section id="home" class="screen active">

  <div class="top-bar">
    <div class="search">🔍 Suchen</div>
    <div id="openProfile" class="avatar">👤</div>
  </div>

  <h1>Mach da weiter,<br>wo du aufgehört hast</h1>

  <div class="card">
    <h2>Politik</h2>
    <p id="count"></p>

    <p class="progress-text">0 % der Fragen beantwortet</p>

    <div class="progress">
      <div class="fill"></div>
    </div>

    <button id="start">Weiter</button>
  </div>

</section>

<!-- QUIZ -->
<section id="quiz" class="screen">

  <div class="top">
    <button id="back">×</button>
    <span id="progressTop"></span>
  </div>

  <h1 id="question"></h1>
  <p id="feedback"></p>

  <div id="answers"></div>

</section>

<!-- PROFILE -->
<section id="profile" class="screen">

  <div class="top">
    <button id="closeProfile">←</button>
    <h2>Profil</h2>
  </div>

  <div class="profile-box">
    <div class="big-avatar">👤</div>
    <h2>Dein Profil</h2>
  </div>

  <div class="card">
    Einstellungen
  </div>

</section>

<nav class="nav">
  <div>Start</div>
</nav>

<script src="script.js"></script>
</body>
</html>
