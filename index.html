<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- START -->
  <section id="home" class="screen active">
    <div class="top-bar">
      <div class="search-box">🔍 <span>Suchen</span></div>
      <div id="openProfile" class="avatar">👤</div>
    </div>

    <h1>Mach da weiter, wo du aufgehört hast</h1>

    <div id="homeCategories"></div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="screen">
    <div class="quiz-top">
      <button id="backHome" class="circle-btn">×</button>
      <h2>Runde 1</h2>
      <button class="circle-btn">⚙</button>
    </div>

    <div class="quiz-progress">
      <span id="currentNumber">1</span>
      <div class="bar"></div>
      <span id="totalNumber">0</span>
    </div>

    <div class="quiz-content">
      <p class="tag">Noch einmal</p>
      <h1 id="questionText"></h1>
      <p id="feedback" class="feedback"></p>
      <div id="answers"></div>
    </div>
  </section>

  <!-- PROFIL -->
  <section id="profile" class="screen">
    <div class="profile-top">
      <button id="closeProfile" class="circle-btn">←</button>
      <h2>Profil</h2>
    </div>

    <div class="profile-info">
      <div class="big-avatar">👤</div>
      <h1>Dein Profil</h1>
    </div>

    <div class="settings-card">⚙ Einstellungen</div>
  </section>

  <!-- BIBLIOTHEK -->
  <section id="library" class="screen">
    <div class="library-head">
      <h1>Deine Bibliothek</h1>
      <button id="addFolder" class="circle-btn">+</button>
    </div>

    <h2 class="library-subtitle">Ordner</h2>

    <div id="folderList"></div>
  </section>

  <!-- FRAGEN LISTE -->
  <section id="questionList" class="screen">
    <div class="profile-top">
      <button id="backLibrary" class="circle-btn">←</button>
      <h2 id="folderTitle">Politik</h2>
    </div>

    <div id="questionItems"></div>

    <button id="addQuestionBtn" class="floating-plus">+</button>
  </section>

  <!-- FRAGE DETAILS -->
  <section id="questionDetail" class="screen">
    <div class="profile-top">
      <button id="backQuestions" class="circle-btn">←</button>
      <h2>Frage</h2>
    </div>

    <div id="detailBox" class="detail-card"></div>
  </section>

  <!-- ADD QUESTION MODAL -->

<div id="folderModal" class="folder-modal">
  <div class="folder-create-box">
    <div class="folder-handle"></div>

    <div class="folder-actions">
      <button id="cancelFolder" class="folder-btn dark">Abbrechen</button>
      <button id="createFolder" class="folder-btn blue">Erstellen</button>
    </div>

    <div class="folder-icon-big">📁</div>

    <input id="folderNameInput" class="folder-name-input" value="Unbenannter Ordner">
  </div>
</div>
  
  <div id="modal" class="modal">
    <div class="modal-box">
      <h2>Frage hinzufügen</h2>
      <textarea id="questionInput" placeholder="Frage 106&#10;&#10;Text der Frage...&#10;&#10;Antwort 1&#10;Antwort 2&#10;Antwort 3&#10;Antwort 4&#10;Antwort 5&#10;Antwort (hier die Nummer eingeben): 1"></textarea>
      <button id="saveQuestion" class="main-btn">Speichern</button>
      <button id="closeModal" class="main-btn secondary">Abbrechen</button>
    </div>
  </div>

  <!-- NAVIGATION -->
  <nav class="bottom-nav">
    <div id="navStart" class="nav-item">⌂<br>Start</div>
    <div id="navLibrary" class="nav-item">▣<br>Bibliothek</div>
  </nav>

  <script src="script.js"></script>
</body>
</html>
